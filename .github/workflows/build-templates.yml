name: build-templates

on:
  push:
  workflow_dispatch:
    inputs:
      build_mode:
        description: How to handle existing templates or VMIDs in Proxmox
        required: false
        default: overwrite
        type: choice
        options:
          - overwrite
          - skip
          - default
      build_target:
        description: Build target to pass to build.py
        required: false
        default: all
        type: string

permissions:
  contents: read

concurrency:
  group: packer-target-environment
  cancel-in-progress: true

jobs:
  build:
    name: Build all templates
    runs-on: arc-runners
    timeout-minutes: 720
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      VAULT_CACERT: /tmp/vault-ca.pem
      PACKER_LOG: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.15.1"

      - name: Install runner dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates sshpass xorriso
          vault_version="1.19.5"
          curl -fsSLo /tmp/vault.zip "https://releases.hashicorp.com/vault/${vault_version}/vault_${vault_version}_linux_amd64.zip"
          sudo unzip -o /tmp/vault.zip vault -d /usr/local/bin
          sudo chmod 0755 /usr/local/bin/vault

      - name: Write Vault CA certificate
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.VAULT_CACERT }}" > /tmp/vault-ca.pem
          sudo install -m 0644 /tmp/vault-ca.pem /usr/local/share/ca-certificates/vault-viking-org.crt
          sudo update-ca-certificates

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          . .venv/bin/activate
          python --version
          ansible --version
          ansible-playbook --version
          ansible-galaxy --version
          packer version
          sshpass -V

      - name: Initialize packer plugins
        shell: bash
        run: |
          set -euo pipefail
          . .venv/bin/activate
          ./build.py --init-only "${{ github.event.inputs.build_target || 'all' }}"

      - name: Build templates
        shell: bash
        run: |
          set -euo pipefail
          . .venv/bin/activate

          build_mode="${{ github.event.inputs.build_mode }}"
          if [ -z "$build_mode" ]; then
            build_mode="overwrite"
          fi

          build_target="${{ github.event.inputs.build_target }}"
          if [ -z "$build_target" ]; then
            build_target="all"
          fi

          args=()
          case "$build_mode" in
            overwrite)
              args+=(--overwrite)
              ;;
            skip)
              args+=(--skip)
              ;;
            default)
              ;;
            *)
              echo "Unsupported build mode: $build_mode" >&2
              exit 1
              ;;
          esac

          build_pid=""
          cleanup() {
            if [ -n "${build_pid}" ] && kill -0 "${build_pid}" 2>/dev/null; then
              kill -INT "${build_pid}" 2>/dev/null || true
              wait "${build_pid}" || true
            fi
          }

          trap 'cleanup; exit 130' INT TERM

          ./build.py "${args[@]}" "$build_target" &
          build_pid=$!
          wait "${build_pid}"
