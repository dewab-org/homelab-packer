---
- name: Template cleanup
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install packages
      ansible.builtin.apt:
        name:
          - bat
          - curl
          - dnsutils
          - fd-find
          - fzf
          - git
          - iputils-ping
          - jq
          - lsof
          - net-tools
          - netcat-openbsd
          - nfs-common
          - qemu-guest-agent
          - ripgrep
          - rsync
          - strace
          - sysstat
          - tcpdump
          - tmux
          - tree
          - unzip
          - vim
          - wget
          - zip
          - zsh
        state: present
        update_cache: true

    - name: Symlink fdfind to fd
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: /usr/local/bin/fd
        state: link

    - name: Symlink batcat to bat
      ansible.builtin.file:
        src: /usr/bin/batcat
        dest: /usr/local/bin/bat
        state: link

    - name: Install yq
      ansible.builtin.get_url:
        url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        dest: /usr/local/bin/yq
        mode: "0755"

    - name: Enable qemu-guest-agent service
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true

    - name: Install custom CA certificates
      ansible.builtin.copy:
        content: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/ca auth_method=token validate_certs=False')['bundle'] }}"
        dest: /usr/local/share/ca-certificates/homelab-ca-bundle.crt
        owner: root
        group: root
        mode: "0644"

    - name: Update CA trust store
      ansible.builtin.command: update-ca-certificates
      changed_when: true

    - name: Find SSH host keys
      ansible.builtin.find:
        paths: /etc/ssh
        patterns: "ssh_host_*key*"
        file_type: file
      register: ssh_host_keys

    - name: Remove SSH host keys
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ ssh_host_keys.files }}"

    - name: Reset machine-id
      ansible.builtin.copy:
        content: ""
        dest: /etc/machine-id
        owner: root
        group: root
        mode: "0444"

    - name: Ensure machine-id file exists
      ansible.builtin.file:
        path: /etc/machine-id
        state: touch
        owner: root
        group: root
        mode: "0444"

    - name: Remove dbus machine-id
      ansible.builtin.file:
        path: /var/lib/dbus/machine-id
        state: absent

    - name: Ensure dbus directory exists
      ansible.builtin.file:
        path: /var/lib/dbus
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Link dbus machine-id to /etc/machine-id
      ansible.builtin.file:
        src: /etc/machine-id
        dest: /var/lib/dbus/machine-id
        state: link

    - name: Clear cloud-init instance IDs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/cloud/instance-id
        - /var/lib/cloud/instance-id.old

    - name: Remove persistent net rules
      ansible.builtin.file:
        path: /etc/udev/rules.d/70-persistent-net.rules
        state: absent

    - name: Remove all build-time netplan configs
      ansible.builtin.shell: find /etc/netplan -name '*.yaml' -delete
      changed_when: true

    - name: Write DHCP netplan for deployed VMs
      ansible.builtin.copy:
        dest: /etc/netplan/01-dhcp.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          network:
            version: 2
            ethernets:
              any:
                match:
                  name: "en*"
                dhcp4: true
                dhcp6: false

    - name: Allow root login via cloud-init on deployed VMs
      ansible.builtin.lineinfile:
        path: /etc/cloud/cloud.cfg
        regexp: '^disable_root:'
        line: 'disable_root: false'
