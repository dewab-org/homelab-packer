---
- name: Show registration configuration
  ansible.builtin.debug:
    msg:
      - "satellite_configured={{ satellite_configured }}"
      - "satellite_certificate_configured={{ satellite_certificate_configured }}"
      - "satellite_host={{ satellite_host }}"
      - "satellite_environment={{ satellite_environment | default('') }}"
      - "satellite_username_set={{ (satellite_username | length) > 0 }}"
      - "satellite_password_set={{ (satellite_password | length) > 0 }}"
      - "redhat_username_set={{ (redhat_username | length) > 0 }}"
      - "redhat_password_set={{ (redhat_password | length) > 0 }}"

- name: Validate registration inputs
  ansible.builtin.assert:
    that:
      - satellite_configured or ((redhat_username | length) > 0 and (redhat_password | length) > 0)
      - not satellite_configured or ((satellite_username | length) > 0 and (satellite_password | length) > 0)
    fail_msg: Missing required Red Hat registration inputs from Vault.

- name: Ensure DNS resolvers for registration
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      search lab.local viking.org
      {% for nameserver in registration_nameservers %}
      nameserver {{ nameserver }}
      {% endfor %}

- name: Download Satellite Certificate RPM
  ansible.builtin.get_url:
    url: "{{ satellite_certificate_url }}"
    dest: /tmp/katello-ca-consumer-latest.noarch.rpm
    mode: "0644"
    validate_certs: false
  when: satellite_certificate_configured

- name: Install Satellite Certificate RPM
  ansible.builtin.dnf:
    name: /tmp/katello-ca-consumer-latest.noarch.rpm
    state: present
    disable_gpg_check: true
  when: satellite_certificate_configured

- name: Register against Red Hat Satellite Server
  community.general.redhat_subscription:
    server_hostname: "{{ satellite_host }}"
    username: "{{ satellite_username }}"
    password: "{{ satellite_password }}"
    auto_attach: "{{ satellite_auto_attach | default(omit) }}"
    environment: "{{ satellite_environment }}"
    force_register: true
  no_log: true
  when: satellite_configured

- name: Register against Red Hat Network
  community.general.redhat_subscription:
    username: "{{ redhat_username }}"
    password: "{{ redhat_password }}"
    force_register: true
  no_log: true
  when: not satellite_configured

- name: Update DNF metadata
  ansible.builtin.dnf:
    update_cache: true

- name: Unregister from Red Hat Satellite
  community.general.redhat_subscription:
    state: absent
  no_log: true
  failed_when: false
  when: satellite_configured

- name: Unregister from Red Hat Network
  community.general.redhat_subscription:
    state: absent
  no_log: true
  failed_when: false
  when: not satellite_configured

- name: Remove unused packages
  ansible.builtin.dnf:
    autoremove: true

- name: Clean package manager caches
  ansible.builtin.command: dnf clean all
  changed_when: true
