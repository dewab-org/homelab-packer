---
- name: Template cleanup
  hosts: all
  become: true
  gather_facts: false
  vars:
    _packer_secret: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/packer auth_method=token validate_certs=False') }}"
    _packer_creds: "{{ _packer_secret }}"
    redhat_username: "{{ _packer_creds['redhat_username'] }}"
    redhat_password: "{{ _packer_creds['redhat_password'] }}"
    satellite_host: "{{ _packer_creds['satellite_host'] | default('') }}"
    satellite_environment: "{{ _packer_creds['satellite_environment'] | default('') }}"
    satellite_certificate_url: "{{ _packer_creds['satellite_certificate_url'] | default('') }}"
    satellite_username: "{{ _packer_creds['satellite_username'] | default('') }}"
    satellite_password: "{{ _packer_creds['satellite_password'] | default('') }}"
    satellite_configured: "{{ (satellite_host | length) > 0 }}"

  tasks:
    - name: Download Satellite Certificate RPM
      ansible.builtin.get_url:
        url: "{{ satellite_certificate_url }}"
        dest: /tmp/katello-ca-consumer-latest.noarch.rpm
        mode: "0644"
        validate_certs: false
      when: satellite_configured

    - name: Install Satellite Certificate RPM
      ansible.builtin.dnf:
        name: /tmp/katello-ca-consumer-latest.noarch.rpm
        state: present
        disable_gpg_check: true
      when: satellite_configured

    - name: Register against Red Hat Satellite Server
      community.general.redhat_subscription:
        server_hostname: "{{ satellite_host }}"
        username: "{{ satellite_username }}"
        password: "{{ satellite_password }}"
        auto_attach: true
        environment: "{{ satellite_environment }}"
        force_register: true
      no_log: true
      when: satellite_configured

    - name: Register against Red Hat Network
      community.general.redhat_subscription:
        username: "{{ redhat_username }}"
        password: "{{ redhat_password }}"
        force_register: true
      no_log: true
      when: not satellite_configured

    - name: Update DNF metadata
      ansible.builtin.dnf:
        update_cache: true

    - name: Install Cloud-Init package
      ansible.builtin.dnf:
        name: cloud-init
        state: present

    - name: Enable Cloud-Init service
      ansible.builtin.systemd:
        name: cloud-init
        enabled: true

    - name: Install custom CA certificates
      ansible.builtin.copy:
        content: "{{ lookup('community.hashi_vault.hashi_vault', 'secret/data/ca auth_method=token validate_certs=False')['bundle'] }}"
        dest: /etc/pki/ca-trust/source/anchors/homelab-ca-bundle.pem
        owner: root
        group: root
        mode: "0644"

    - name: Update CA trust store
      ansible.builtin.command: update-ca-trust
      changed_when: true

    - name: Unregister from Red Hat Satellite
      community.general.redhat_subscription:
        state: absent
      no_log: true
      when: satellite_configured

    - name: Unregister from Red Hat Network
      community.general.redhat_subscription:
        state: absent
      no_log: true
      when: not satellite_configured

    - name: Remove unused packages
      ansible.builtin.dnf:
        autoremove: true

    - name: Clean package manager caches
      ansible.builtin.command: dnf clean all
      changed_when: true

    - name: Find SSH host keys
      ansible.builtin.find:
        paths: /etc/ssh
        patterns: "ssh_host_*key*"
        file_type: file
      register: ssh_host_keys

    - name: Remove SSH host keys
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ ssh_host_keys.files }}"

    - name: Reset machine-id
      ansible.builtin.copy:
        content: ""
        dest: /etc/machine-id
        owner: root
        group: root
        mode: "0444"

    - name: Ensure machine-id file exists
      ansible.builtin.file:
        path: /etc/machine-id
        state: touch
        owner: root
        group: root
        mode: "0444"

    - name: Remove dbus machine-id
      ansible.builtin.file:
        path: /var/lib/dbus/machine-id
        state: absent

    - name: Ensure dbus directory exists
      ansible.builtin.file:
        path: /var/lib/dbus
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Link dbus machine-id to /etc/machine-id
      ansible.builtin.file:
        src: /etc/machine-id
        dest: /var/lib/dbus/machine-id
        state: link

    - name: Clear cloud-init instance IDs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/cloud/instance-id
        - /var/lib/cloud/instance-id.old

    - name: Remove persistent net rules
      ansible.builtin.file:
        path: /etc/udev/rules.d/70-persistent-net.rules
        state: absent
