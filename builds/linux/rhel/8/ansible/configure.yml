---
- name: Template cleanup
  hosts: all
  become: true
  gather_facts: false
  vars_files:
    - ../../../ansible/vars/rhel_registration.yml
  vars:
    ansible_python_interpreter: /usr/bin/python3.9
    satellite_auto_attach: true

  tasks:
    - name: Run Red Hat registration tasks
      ansible.builtin.import_tasks: ../../../ansible/tasks/rhel_registration.yml

    - name: Run common cleanup tasks
      ansible.builtin.import_tasks: ../../../ansible/tasks/common_cleanup.yml
